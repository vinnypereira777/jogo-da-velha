<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velha do Vinny - Multiplayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Nome personalizado do jogo -->
        <h1>Velha do Vinny</h1>
        
        <div id="status" class="status">Conectando ao servidor...</div>
        
        <!-- Placar -->
        <div class="scoreboard">
            <div class="score-box">
                <span class="player-label">Jogador X</span>
                <span id="score-X" class="score-value">0</span>
            </div>
            <div class="score-box">
                <span class="player-label">Jogador O</span>
                <span id="score-O" class="score-value">0</span>
            </div>
        </div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <!-- Botão de Reiniciar -->
        <button id="reset-btn" class="reset-btn">Reiniciar Partida</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
